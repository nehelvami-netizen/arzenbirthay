<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İyi ki doğdun ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial;
    color:white;
    overflow-x:hidden;
    background: linear-gradient(-45deg,#ff4d6d,#ffb703,#7209b7,#ff758f);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.card{
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:30px;
    max-width:700px;
    width:100%;
    position:relative;
}

h1{
    font-size:42px;
    margin-bottom:10px;
}

p{
    opacity:0.9;
}

/* GALLERY */
.gallery{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.gallery img{
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:15px;
}

/* BUTTON */
button{
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-weight:bold;
}

/* LETTER */
.letter-box{
    margin-top:20px;
    perspective:1000px;
}

.letter{
    width:100%;
    height:140px;
    position:relative;
    transform-style:preserve-3d;
    transition:0.8s;
    cursor:pointer;
}

.letter.open{
    transform:rotateY(180deg);
}

.face{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:15px;
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.3);
}

.back{
    transform:rotateY(180deg);
    font-size:14px;
    padding:10px;
}

/* HEARTS */
.heart{
    position:fixed;
    top:-10px;
    font-size:18px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(100vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>İyi ki doğdun Arzen ❤️</h1>

<p>Bu sana özel hazırlanmış bir doğum günü hediyesi</p>

<p id="counter"></p>

<div class="gallery">
    <img src="https://picsum.photos/400?1">
    <img src="https://picsum.photos/400?2">
    <img src="https://picsum.photos/400?3">
    <img src="https://picsum.photos/400?4">
</div>

<div class="letter-box">
    <div class="letter" onclick="toggleLetter()">
        <div class="face front">💌 Mektubu Aç</div>
        <div class="face back">
            Seni mutlu etmek için bu küçük sayfayı hazırladım.<br><br>
            İyi ki varsın ❤️<br>
            Her şey seninle güzel.
        </div>
    </div>
</div>

<button onclick="alert('İyi ki doğdun ❤️')">Mesaj</button>

</div>

</div>

<script>

// sayaç
let start = new Date("2024-01-01");
let now = new Date();
let diff = now - start;
let days = Math.floor(diff/(1000*60*60*24));

document.getElementById("counter").innerText =
"Birlikte geçen özel gün: " + days + " gün";

// mektup
function toggleLetter(){
    document.querySelector(".letter").classList.toggle("open");
}

// kalpler
for(let i=0;i<30;i++){
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(h);
}

</script>

</body>
</html>
