<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arzen | Premium Birthday</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f0f0f,#2c2c2c);
    color:white;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.header{
    text-align:center;
    padding:30px 10px;
}

.header h1{
    font-size:45px;
    letter-spacing:2px;
}

.header p{
    opacity:0.7;
}

.card{
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:20px;
    padding:25px;
    margin-top:20px;
    backdrop-filter:blur(10px);
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:none;
    outline:none;
}

button{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:30px;
    background:linear-gradient(135deg,#ff4d6d,#ffb703);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.output{
    display:none;
    margin-top:25px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:15px;
}

.gallery img{
    width:100%;
    height:160px;
    object-fit:cover;
    border-radius:15px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
    <h1>ARZEN</h1>
    <p>Premium Birthday Experience Builder</p>
</div>

<div class="card">

    <input id="name" placeholder="İsim">
    <textarea id="msg" placeholder="Mesaj"></textarea>
    <input type="date" id="date">

    <input id="i1" placeholder="Foto 1 URL">
    <input id="i2" placeholder="Foto 2 URL">
    <input id="i3" placeholder="Foto 3 URL">
    <input id="i4" placeholder="Foto 4 URL">

    <button onclick="create()">Oluştur</button>

</div>

<div class="output" id="out">

    <div class="card">
        <h2 id="oName"></h2>
        <p id="oMsg"></p>
        <div id="days"></div>

        <div class="gallery">
            <img id="g1">
            <img id="g2">
            <img id="g3">
            <img id="g4">
        </div>
    </div>

</div>

</div>

<script>
function create(){
    document.getElementById("out").style.display="block";

    document.getElementById("oName").innerText =
    "İyi ki doğdun " + document.getElementById("name").value;

    document.getElementById("oMsg").innerText =
    document.getElementById("msg").value;

    let d = new Date(document.getElementById("date").value);
    let now = new Date();
    let diff = now - d;
    let days = Math.floor(diff/(1000*60*60*24));

    document.getElementById("days").innerText =
    "Aradan geçen süre: " + days + " gün";

    document.getElementById("g1").src=document.getElementById("i1").value;
    document.getElementById("g2").src=document.getElementById("i2").value;
    document.getElementById("g3").src=document.getElementById("i3").value;
    document.getElementById("g4").src=document.getElementById("i4").value;
}
</script>

</body>
</html>
